type: picture-elements
image: >-
  data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800
  960'>
    <defs>
      <style>
        .sub-label {
          fill: gray;
          font-family: Roboto, Arial, sans-serif;
          font-size: 20px;
        }
      </style>
      <pattern id='diag' patternUnits='userSpaceOnUse' width='10' height='10' patternTransform='rotate(-45)'>
        <line x1='0' y1='0' x2='0' y2='10' stroke='gray' stroke-width='15' opacity='0.1' />
      </pattern>
    </defs>
    <rect x='10' y='890' width='780' height='50' fill='url(%23diag)' opacity='1' />
    <rect x='580' y='15' width='40' height='870' fill='url(%23diag)' opacity='1' />
    <rect x='50' y='40' width='200' height='350' rx='20' fill='gray' opacity='0.1'/>
    <rect x='270' y='40' width='200' height='350' rx='20' fill='gray' opacity='0.1'/>
    <rect x='380' y='450' width='40' height='80' rx='20' fill='gray' opacity='0.1'/>
    <rect x='445' y='560' width='130' height='130' rx='20' fill='gray' opacity='0.1'/>
    <rect x='630' y='530' width='160' height='270' rx='20' fill='gray' opacity='0.1'/>
    <rect x='100' y='530' width='200' height='320' rx='20' fill='gray' opacity='0.1'/>
    <text x='50%' y='923' text-anchor='middle' class='sub-label'>~ Heat distribution system ~</text>
  </svg>
elements:
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <path d='M190 360 v75 h190' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M380 475 h-260 v-115' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M155 360 v75 h-91 v110' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M400 360 v60' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M400 500 v360' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M340 860 v-500' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M470 120 h260 v380' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M470 160 h225 v340' fill='none' stroke='gray' stroke-width='3' opacity='0.2' />
        <path d='M282 500 v-100 h20 v-40' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
        <path d='M212 500 v-100 h-0 v-40' fill='none' stroke='gray' stroke-width='4' opacity='0.2' />
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <style>
          @keyframes flow_dhw {from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
          .dhw { animation: flow_dhw 0.6s linear infinite; }
        </style>
        <path d='M155 360 v80 h-91 v105' stroke='%23FF8C00' stroke-width='4' fill='none' stroke-dasharray='4,6' class='dhw' />
        <path d='M212 499 v-100 h-0 v-40' stroke='%23FF8C00' stroke-width='4' fill='none' stroke-dasharray='4,6' class='dhw' />
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
    card_mod:
      style: |
        :host {
          display: {{ 'block' if states('sensor.xtreme_boiler_ot_dhw_flowrate')|float(0) > 0 else 'none' }};
        }
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <style>
          @keyframes stroke {from{stroke-dashoffset:0}to{stroke-dashoffset:20}} 
          .f { animation: stroke 1s linear infinite; }
        </style>
        <path d='M190 360 v75 h190' stroke='%233498db' stroke-width='6' fill='none' stroke-dasharray='4,6' class='f' />
        <path d='M380 475 h-260 v-115' stroke='%23FF8C00' stroke-width='6' fill='none' stroke-dasharray='4,6' class='f' /> 
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
    card_mod:
      style: |
        :host {
          display: {{ 'block' if states('sensor.xtend_fsystem')|float(0) > 0 else 'none' }};
          filter: {{ 'none' if is_state('binary_sensor.xtreme_actief_check', 'on') else 'grayscale(100%) opacity(0.5)' }};
        }
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <style>@keyframes stroke {from{stroke-dashoffset:20}to{stroke-dashoffset:0}} .f{animation: stroke 1s linear infinite;}</style>
        <path d='M400 360 v60' stroke='%23FF8C00' stroke-width='6' fill='none' stroke-dasharray='4,6' class='f' />
        <path d='M400 495 v365' stroke='%23FF8C00' stroke-width='6' fill='none' stroke-dasharray='4,6' class='f' />
        <path d='M339 360 v500' stroke='%233498db' stroke-width='6' fill='none' stroke-dasharray='4,6' class='f' />
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
    card_mod:
      style: |
        :host {
          display: {{ 'block' if states('sensor.xtend_fsystem')|float(0) > 0 else 'none' }};
          filter: {{ 'none' if is_state('binary_sensor.xtend_actief_check', 'on') else 'grayscale(100%) opacity(0.5)' }};
        }
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <style>
          @keyframes heen {from{stroke-dashoffset:20}to{stroke-dashoffset:0}} 
          @keyframes terug {from{stroke-dashoffset:0}to{stroke-dashoffset:20}} 
          .fh{animation: heen 1s linear infinite;} 
          .ft{animation: terug 1s linear infinite;}
        </style>
        <path d='M470 120 h260 v380' stroke='%233498DB' stroke-width='6' fill='none' stroke-dasharray='4,6' class='fh' />
        <path d='M470 165 h225 v335' stroke='%23FF8C00' stroke-width='4' fill='none' stroke-dasharray='4,6' class='ft' />
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
    card_mod:
      style: |
        :host { 
          display: {{ 'block' if states('sensor.xtend_actualfan1speed')|float(0) > 0 else 'none' }}; 
        }
  - type: image
    image: >-
      data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0
      800 900'>
        <style>
          @keyframes xtore_cv {from{stroke-dashoffset:0}to{stroke-dashoffset:20}}
          .xcv{animation: xtore_cv 1s linear infinite;}
        </style>
        <path d='M282 500 v-100 h20 v-40' stroke='%23FF8C00' stroke-width='4' fill='none' stroke-dasharray='4,6' class='xcv' />
      </svg>
    style:
      top: 50%
      left: 50%
      width: 100%
      pointer-events: none
    card_mod:
      style: |
        :host {
          display: {{ 'block' if states('sensor.xtend_fsystem')|float(0) > 0 else 'none' }};
        }
  - type: custom:mushroom-title-card
    title: Home
    style:
      top: 60%
      left: 64%
    card_mod:
      style: |
        ha-card { --title-font-size: 1rem !important; }
  - type: state-label
    entity: sensor.xtend_roomtemperature_1
    prefix: "C: "
    style:
      top: 66%
      left: 62%
      font-size: 0.8rem
  - type: custom:mushroom-title-card
    title: Xtreme
    style:
      top: 7%
      left: 19%
    card_mod:
      style: |
        ha-card { 
          --title-font-size: 1rem !important; 
          --title-font-weight: bold !important; 
        }
  - type: state-label
    entity: sensor.xtreme_tboilersupply
    style:
      top: 14%
      left: 19%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#FF8C00' if is_state('binary_sensor.xtreme_actief_check', 'on') else 'gray' }};
        }
  - type: state-label
    entity: sensor.xtreme_deltat
    prefix: "ΔT: "
    style:
      top: 21%
      left: 19%
      color: var(--secondary-text-color)
  - type: state-label
    entity: sensor.xtreme_tboilerreturn
    style:
      top: 28%
      left: 19%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#3498db' if is_state('binary_sensor.xtreme_actief_check', 'on') else 'gray' }};
        }
  - type: state-icon
    entity: binary_sensor.xtreme_actief_check
    style:
      top: 35%
      left: 19%
    card_mod:
      style: |
        :host { 
          position: absolute; 
          transform: translate(-50%, -50%); 
          animation: {{ 'pulse_color 2s ease-in-out infinite' if is_state('binary_sensor.xtreme_actief_check', 'on') else 'none' }}; 
        }
        @keyframes pulse_color { 
          0%, 100% { transform: translate(-50%, -50%) scale(1); } 
          50% { transform: translate(-50%, -50%) scale(1.5); } 
        }
  - type: custom:mushroom-title-card
    title: Xtore
    style:
      top: 57%
      left: 25%
    card_mod:
      style: |
        ha-card { 
          --title-font-size: 1rem !important; 
          --title-font-weight: bold !important; 
        }
  - type: state-label
    entity: sensor.xtend_dhw_actual_temperature_xtore
    style:
      top: 64%
      left: 25%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#FF8C00' if is_state('sensor.xtend_dhw_status_xtore', 'Heating') else 'gray' }};
        }
  - type: state-icon
    entity: sensor.xtend_dhw_status_xtore
    icon: mdi:water-boiler
    style:
      top: 70%
      left: 25%
    card_mod:
      style: |
        :host {
          /* Added legionellearun to the animation check so it pulses then too */
          animation: {{ 'pulse_xtore 2s ease-in-out infinite' if states('sensor.xtend_dhw_status_xtore') in ['Heating', 'heating', 'legionellearun'] else 'none' }};
        }
        @keyframes pulse_xtore {
          0%, 100% { transform: translate(-50%, -50%) scale(1); }
          50% { transform: translate(-50%, -50%) scale(1.4); }
        }
        state-badge {
          {% set status = states('sensor.xtend_dhw_status_xtore') %}
          
          {% if status in ['Heating', 'Heating1'] %}
            color: #FF8C00 !important;
          {% elif status in ['legionellearun', 'LegionellaRun', 'Legionella run'] %}
            color: red !important;
          {% elif status == 'Standby' %}
            color: #4CAF50 !important;
          {% else %}
            color: gray !important;
          {% endif %}
        }
  - type: state-label
    entity: sensor.xtend_dhw_setpoint_xtore
    prefix: "→ "
    style:
      top: 77%
      left: 25%
      font-size: 0.85rem
      color: var(--secondary-text-color)
  - type: state-label
    entity: sensor.xtend_dhw_availability_xtore
    style:
      top: 83%
      left: 23%
      font-size: 0.85rem
      color: var(--secondary-text-color)
    suffix: ""
  - type: state-label
    entity: sensor.xtend_dhw_tank_volume_xtore
    style:
      top: 83%
      left: 29%
      font-size: 0.75rem
      color: var(--secondary-text-color)
    prefix: "/ "
    suffix: " "
  - type: custom:mushroom-title-card
    title: Xtend
    style:
      top: 7%
      left: 46%
    card_mod:
      style: |
        ha-card { 
          --title-font-size: 1rem !important; 
          --title-font-weight: bold !important; 
        }
  - type: state-label
    entity: sensor.xtend_thpsupply
    style:
      top: 14%
      left: 46%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#FF8C00' if is_state('binary_sensor.boiler_burner', 'on') else 'gray' }};
        }
  - type: state-label
    entity: sensor.xtend_deltat
    prefix: "ΔT: "
    style:
      top: 21%
      left: 46%
      color: var(--secondary-text-color)
  - type: state-label
    entity: sensor.xtend_thpreturn
    style:
      top: 28%
      left: 46%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#3498db' if is_state('binary_sensor.boiler_burner', 'on') else 'gray' }};
        }
  - type: state-icon
    entity: binary_sensor.xtend_actief_check
    style:
      top: 35%
      left: 46%
    card_mod:
      style: |
        :host { 
          animation: {{ 'pulse_color 2s infinite' if is_state('binary_sensor.xtend_actief_check', 'on') else 'none' }}; 
        }
        @keyframes pulse_color { 
          0%, 100% { transform: translate(-50%,-50%) scale(1); } 
          50% { transform: translate(-50%,-50%) scale(1.4); } 
        }
  - type: state-label
    entity: sensor.xtend_fsystem
    style:
      top: 96%
      left: 24%
      color: var(--secondary-text-color)
      font-size: 0.9rem
    prefix: "F: "
  - type: state-label
    entity: sensor.xtend_requestedtemperature
    prefix: "T: "
    style:
      top: 90%
      left: 65%
      color: var(--secondary-text-color)
      font-size: 0.8rem
  - type: state-icon
    entity: sensor.xtreme_boiler_ot_dhw_flowrate
    icon: mdi:shower-head
    style:
      top: 62%
      left: 8%
    card_mod:
      style: |
        state-badge {
          color: {{ '#f1c40f' if states('sensor.xtreme_boiler_ot_dhw_flowrate')|float(0) > 0 }} !important;
        }
  - type: state-label
    entity: sensor.xtend_roomtemperature_set_1
    prefix: "T: "
    style:
      top: 70%
      left: 62%
      font-size: 0.8rem
  - type: custom:mushroom-title-card
    title: Outdoor
    style:
      top: 5%
      left: 89%
    card_mod:
      style: |
        ha-card { --title-font-size: 1rem !important; }
  - type: state-label
    entity: sensor.xtend_toutdoor
    style:
      top: 11%
      left: 89%
      font-size: 0.9rem
  - type: custom:mushroom-title-card
    title: ODU
    style:
      top: 57%
      left: 89%
    card_mod:
      style: |
        ha-card { 
          --title-font-size: 1rem !important; 
          --title-font-weight: bold !important; 
        }
  - type: state-label
    entity: sensor.xtend_temperaturecondensor_refrigrerant_gas
    style:
      top: 64%
      left: 89%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#FF8C00' if states('sensor.xtend_actualfan1speed')|float(0) > 0 else 'gray' }};
        }
  - type: state-label
    entity: sensor.xtend_temperaturecondensor_refrigrerant_liquid
    style:
      top: 69%
      left: 89%
      font-weight: bold
      font-size: 1rem
    card_mod:
      style: |
        :host {
          color: {{ '#3498db' if states('sensor.xtend_actualfan1speed')|float(0) > 0 else 'gray' }};
        }
  - type: state-icon
    entity: sensor.xtend_fsystem
    icon: mdi:fan
    style:
      top: 75%
      left: 89%
    card_mod:
      style: |
        :host { 
          position: absolute; 
          transform: translate(-50%, -50%); 
        }
        state-badge { 
          animation: {{ 'rotation ' + (500 / ([states('sensor.xtend_actualfan1speed')|float(0), 0.1]|max))|string + 's linear infinite' if states('sensor.xtend_actualfan1speed')|float(0) > 0 else 'none' }}; 
          color: {{ '#f1c40f' if states('sensor.xtend_actualfan1speed')|float(0) > 0 }} !important;
        }
        @keyframes rotation { 
          from { transform: rotate(0deg); } 
          to { transform: rotate(360deg); } 
        }
  - type: state-label
    entity: sensor.xtend_actualfan1speed
    style:
      top: 80%
      left: 89%
      color: var(--secondary-text-color)
      font-size: 0.8rem
card_mod:
  style: |
    ha-card {
      background-color: var(--card-background-color) !important;
      border-radius: 12px;
    }
grid_options:
  columns: 12
  rows: 8,5
